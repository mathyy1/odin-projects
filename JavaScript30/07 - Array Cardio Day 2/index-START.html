<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Array Cardio 💪💪</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <p><em>Psst: have a look at the JavaScript Console</em> 💁</p>
  <script>
    // ## Array Cardio Day 2

    const people = [
      { name: 'Wes', year: 1988 },
      { name: 'Kait', year: 1986 },
      { name: 'Irv', year: 1970 },
      { name: 'Lux', year: 2015 }
    ];

    const comments = [
      { text: 'Love this!', id: 523423 },
      { text: 'Super good', id: 823423 },
      { text: 'You are the best', id: 2039842 },
      { text: 'Ramen is my fav food ever', id: 123523 },
      { text: 'Nice Nice Nice!', id: 542328 }
    ];
    
    console.log(comments)

    const isAdult = people.some(person => ((new Date()).getFullYear()) - person.year >= 19);
    console.log(isAdult)

    const allAdults = people.every(people => ((new Date()).getFullYear()) - people.year >= 19);
    console.log(allAdults)

    const comment = comments.find(com => com.id === 823423);
    console.log(comment)

    const commentIndex = comments.findIndex(com => com.id == 823423)
    if (commentIndex !== -1) comments.splice(commentIndex, 1);

    console.log(comments)

  </script>
</body>
</html>
